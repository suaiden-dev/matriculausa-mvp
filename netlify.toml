[build]
  base = "project"
  publish = "dist"
  command = "npm run build:netlify"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  included_files = ["emailProcessor.js", "emailPollingService.js", "aiService.js", "graphService.js"]

[[redirects]]
  from = "/api/polling-user"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
  NODE_OPTIONS = "--max_old_space_size=4096"
